name: Validate KB Contracts

on:
  workflow_dispatch:
  push:
    paths:
      - ".agentcodex/registry/**"
      - ".agentcodex/cache/manifests/**"
      - ".agentcodex/cache/summaries/**"
      - ".agentcodex/scripts/**"
      - ".github/workflows/validate-kb-contracts.yml"
  pull_request:
    paths:
      - ".agentcodex/registry/**"
      - ".agentcodex/cache/manifests/**"
      - ".agentcodex/cache/summaries/**"
      - ".agentcodex/scripts/**"
      - ".github/workflows/validate-kb-contracts.yml"

permissions:
  contents: read

jobs:
  validate-kb-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.11"

      - name: Refresh local summaries manifest
        run: python3 .agentcodex/scripts/refresh_summaries.py --apply

      - name: Build retrieval index manifest
        run: python3 .agentcodex/scripts/build_index.py --apply

      - name: Validate KB contracts
        run: python3 .agentcodex/scripts/validate_kb_contracts.py
