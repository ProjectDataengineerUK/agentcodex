name: Package CI

on:
  workflow_dispatch:
  push:
    paths:
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
      - "scripts/**"
      - ".agentcodex/**"
      - "docs/**"
      - ".github/workflows/package-ci.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
      - "scripts/**"
      - ".agentcodex/**"
      - "docs/**"
      - ".github/workflows/package-ci.yml"

permissions:
  contents: read

jobs:
  build-and-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Create clean virtualenv
        run: python -m venv --system-site-packages /tmp/agentcodex-ci

      - name: Install built wheel
        run: /tmp/agentcodex-ci/bin/python -m pip install --force-reinstall dist/*.whl

      - name: Validate installed runtime bundle
        run: |
          /tmp/agentcodex-ci/bin/python -c "import agentcodex_cli.cli as c; print(c.resolve_repo_root())"
          test -f /tmp/agentcodex-ci/share/agentcodex/scripts/agentcodex.py
          test -f /tmp/agentcodex-ci/share/agentcodex/.agentcodex/project-standard.json
          test -f /tmp/agentcodex-ci/share/agentcodex/docs/COMMANDS.md

      - name: Run installed CLI validation
        run: /tmp/agentcodex-ci/bin/python -c "import agentcodex_cli.cli as c; raise SystemExit(c.main())" validate

      - name: Verify installed CLI blocks invalid workflow ids
        run: |
          set +e
          /tmp/agentcodex-ci/bin/python -c "import agentcodex_cli.cli as c; raise SystemExit(c.main())" workflow-status ../escape
          status=$?
          test "$status" -eq 1
