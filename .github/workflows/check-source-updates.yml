name: Check Source Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1-5"

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Dry-run update check
        run: python3 .agentcodex/scripts/check_updates.py

      - name: Upload update report
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: .agentcodex/reports/update-report.md

