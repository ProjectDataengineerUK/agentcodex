name: Refresh KB

on:
  workflow_dispatch:
  schedule:
    - cron: "43 6 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-kb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Apply update check
        run: python3 .agentcodex/scripts/check_updates.py --apply

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload update artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kb-refresh-artifacts
          path: |
            .agentcodex/reports/update-report.md
            .agentcodex/reports/source-sync-report.md
            .agentcodex/reports/summary-refresh-report.md
            .agentcodex/reports/index-build-report.md
            .agentcodex/cache/manifests/retrieval-index.json
            .agentcodex/cache/manifests/retrieval-index.md

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(kb): refresh source lock, summaries, and index"
          title: "chore(kb): refresh source lock, summaries, and index"
          body: |
            Automated KB refresh generated by GitHub Actions.

            This PR updates:
            - `.agentcodex/registry/repos-lock.yaml`
            - cached source metadata
            - local summaries
            - retrieval index
            - update reports

            Safety:
            - metadata-first sync
            - no destructive cleanup
            - only repository-local artifacts are changed
          branch: automation/refresh-kb
          delete-branch: true

