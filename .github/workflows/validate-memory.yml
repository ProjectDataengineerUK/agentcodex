name: Validate Memory

on:
  push:
    paths:
      - "scripts/memory_*.py"
      - "scripts/agentcodex.py"
      - ".agentcodex/memory/**"
      - ".agentcodex/tests/memory/**"
      - ".github/workflows/validate-memory.yml"
  pull_request:
    paths:
      - "scripts/memory_*.py"
      - "scripts/agentcodex.py"
      - ".agentcodex/memory/**"
      - ".agentcodex/tests/memory/**"
      - ".github/workflows/validate-memory.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Run memory tests
        run: python3 -m unittest discover -s .agentcodex/tests/memory -p 'test_*.py'

      - name: Validate memory contracts
        run: python3 scripts/agentcodex.py memory-validate

      - name: Run memory lint
        run: python3 scripts/agentcodex.py memory-lint

      - name: Check backend health surface
        run: python3 scripts/agentcodex.py memory-health
